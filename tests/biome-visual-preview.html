<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stack or Splat — Biome Visual QA</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 24px; background: #070d25; color: #eefcff; font-family: system-ui, sans-serif; }
        h1 { margin: 0 0 6px; font-size: 24px; }
        p { margin: 0 0 22px; color: #9dd9ea; }
        main { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; max-width: 1240px; }
        figure { margin: 0; overflow: hidden; border: 4px solid #172a53; border-radius: 18px; background: #101b3b; box-shadow: 0 12px 30px rgba(0,0,0,.26); }
        canvas { display: block; width: 100%; aspect-ratio: 16 / 9; }
        figcaption { padding: 10px 14px 12px; font-weight: 800; letter-spacing: .08em; }
        @media (max-width: 760px) { main { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <h1>Biome visual QA</h1>
    <p>The production background renderer at a fixed 16:9 viewport.</p>
    <main id="grid"></main>
    <script type="module">
        import { drawCoverBiomeBackground } from '../js/rendering/BiomeBackgroundRenderer.js?v=moon-flicker-1';

        const biomes = [
            ['plains', 'PLAINS · light adventure'],
            ['cave', 'CAVE · crystals and stone'],
            ['ice', 'ICE · aurora and snow'],
            ['desert', 'DESERT · sun and dunes'],
            ['sky', 'SKY · clouds and floating islands'],
            ['apocalypse', 'APOCALYPSE · smoke and ruins'],
            ['moon', 'MOON · lunar horizon'],
            ['black_hole', 'BLACK HOLE · cosmic vortex']
        ];

        const grid = document.getElementById('grid');
        for (const [type, label] of biomes) {
            const figure = document.createElement('figure');
            const canvas = document.createElement('canvas');
            canvas.width = 560;
            canvas.height = 315;
            const caption = document.createElement('figcaption');
            caption.textContent = label;
            figure.append(canvas, caption);
            grid.append(figure);

            const previewGame = { width: canvas.width, height: canvas.height, camera: { x: 128 } };
            drawCoverBiomeBackground(canvas.getContext('2d'), previewGame, type);
        }
    </script>
</body>
</html>
